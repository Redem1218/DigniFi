<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigniFi · AM Performance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --sf-blue: #0176d3;
    --sf-navy: #032d60;
    --sf-teal: #06a59a;
    --sf-green: #2e844a;
    --sf-green-bg: #cdefc4;
    --sf-red: #ba0517;
    --sf-red-bg: #ffdde1;
    --sf-orange: #fe9339;
    --sf-orange-bg: #fff3e0;
    --sf-gray: #f3f3f3;
    --sf-border: #dddbda;
    --sf-text: #181818;
    --sf-muted: #3e3e3c;
    --sf-light: #706e6b;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--sf-text);
    background: var(--sf-gray);
    min-height: 100vh;
  }

  /* ── Top Nav ── */
  .topnav {
    background: var(--sf-navy);
    color: white;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 3px solid var(--sf-blue);
  }
  .topnav-logo {
    display: flex; align-items: center; gap: 10px;
  }
  .topnav-logo-icon {
    width: 30px; height: 30px; border-radius: 6px;
    background: var(--sf-blue); color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .topnav-title { font-size: 15px; font-weight: 600; }
  .topnav-title span { opacity: 0.6; }
  .topnav-spacer { flex: 1; }
  .topnav-identity {
    display: flex; align-items: center; gap: 10px; font-size: 12px;
  }
  .topnav-identity label { opacity: 0.7; }
  .topnav-identity select {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  .topnav-identity select option { color: black; }

  /* ── Page Header ── */
  .pageheader {
    background: white;
    padding: 16px 24px;
    border-bottom: 1px solid var(--sf-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .breadcrumb {
    font-size: 11px; color: var(--sf-muted);
    text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
  }
  .breadcrumb .crumb-link {
    cursor: pointer;
  }
  .breadcrumb .crumb-link:hover { color: var(--sf-blue); }
  .breadcrumb .sep { opacity: 0.5; margin: 0 4px; }
  .pageheader-title {
    font-size: 22px; font-weight: 700; color: var(--sf-navy);
    margin-top: 2px;
  }
  .pageheader-sub {
    font-size: 12px; color: var(--sf-muted); margin-top: 2px;
  }
  .btn-back {
    font-size: 12px; background: white;
    border: 1px solid var(--sf-blue);
    color: var(--sf-blue);
    padding: 6px 14px; border-radius: 4px;
    cursor: pointer; font-weight: 600;
  }
  .btn-back:hover { background: #f0f7fc; }

  /* ── Main Content ── */
  .main {
    padding: 20px;
    max-width: 1480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: white;
    border: 1px solid var(--sf-border);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .card-title {
    padding: 12px 16px;
    border-bottom: 1px solid var(--sf-border);
    display: flex; justify-content: space-between; align-items: center;
    background: #fafaf9;
    border-radius: 6px 6px 0 0;
  }
  .card-title-text {
    font-size: 13px; font-weight: 700;
    color: var(--sf-navy); letter-spacing: 0.2px;
    text-transform: uppercase;
  }
  .card-title-action { font-size: 11px; color: var(--sf-muted); }
  .card-body { padding: 16px; }
  .card-body.no-pad { padding: 0; }

  /* ── KPI Tile ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
  }
  @media (max-width: 1200px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 700px)  { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

  .kpi-tile {
    background: white;
    border: 1px solid var(--sf-border);
    border-left: 3px solid var(--sf-green);
    border-radius: 4px;
    padding: 12px 14px;
  }
  .kpi-tile.green  { border-left-color: var(--sf-green); }
  .kpi-tile.yellow { border-left-color: var(--sf-orange); }
  .kpi-tile.red    { border-left-color: var(--sf-red); }
  .kpi-tile-label {
    font-size: 10px; font-weight: 700; color: var(--sf-muted);
    text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px;
  }
  .kpi-tile-value {
    font-size: 24px; font-weight: 700; color: var(--sf-navy); line-height: 1;
  }
  .kpi-tile-sub {
    font-size: 11px; color: var(--sf-muted); margin-top: 4px;
  }
  .kpi-tile-target {
    font-size: 10px; color: var(--sf-light); margin-top: 4px;
  }

  /* ── Status Dot + Pill ── */
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    box-shadow: 0 0 0 2px transparent;
  }
  .dot.small { width: 6px; height: 6px; }
  .dot.green  { background: var(--sf-green);  box-shadow: 0 0 0 2px var(--sf-green-bg); }
  .dot.yellow { background: var(--sf-orange); box-shadow: 0 0 0 2px var(--sf-orange-bg); }
  .dot.red    { background: var(--sf-red);    box-shadow: 0 0 0 2px var(--sf-red-bg); }

  .pill {
    display: inline-flex;
    align-items: center;
    font-size: 11px; font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
  }
  .pill.green  { background: var(--sf-green-bg);  color: var(--sf-green);  border: 1px solid var(--sf-green); }
  .pill.yellow { background: var(--sf-orange-bg); color: var(--sf-orange); border: 1px solid var(--sf-orange); }
  .pill.red    { background: var(--sf-red-bg);    color: var(--sf-red);    border: 1px solid var(--sf-red); }

  /* ── Avatar ── */
  .avatar {
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sf-blue) 0%, var(--sf-navy) 100%);
    color: white;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .avatar-status {
    position: absolute;
    bottom: -1px; right: -1px;
    border-radius: 50%;
    border: 2px solid white;
  }
  .avatar-status.green  { background: var(--sf-green); }
  .avatar-status.yellow { background: var(--sf-orange); }
  .avatar-status.red    { background: var(--sf-red); }

  /* ── Leaderboard Table ── */
  .leader-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .leader-table thead {
    background: #fafaf9;
    border-bottom: 2px solid var(--sf-border);
  }
  .leader-table th {
    padding: 10px 12px; text-align: center;
    font-size: 11px; font-weight: 700; color: var(--sf-muted);
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .leader-table th.left { text-align: left; }
  .leader-table tbody tr {
    border-bottom: 1px solid var(--sf-border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .leader-table tbody tr:hover { background: #f7fafd; }
  .leader-table td {
    padding: 12px; text-align: center;
    font-size: 13px; color: var(--sf-text);
  }
  .leader-table td.left { text-align: left; }

  .rank-badge {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--sf-gray);
    color: var(--sf-navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    margin: 0 auto;
  }
  .rank-badge.gold   { background: #ffd700; color: var(--sf-navy); }
  .rank-badge.bottom { background: var(--sf-red-bg); color: var(--sf-red); }

  /* ── Tier Bar ── */
  .tierbar {
    display: flex;
    width: 100%;
    height: 22px;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--sf-border);
  }
  .tierbar-seg {
    color: white;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .tierbar-seg.he { background: var(--sf-green); }
  .tierbar-seg.me { background: var(--sf-teal); }
  .tierbar-seg.le { background: var(--sf-orange); }
  .tierbar-seg.d  { background: var(--sf-red); }

  .btn-link {
    font-size: 11px;
    background: transparent;
    border: none;
    color: var(--sf-blue);
    cursor: pointer;
    font-weight: 600;
  }
  .btn-link:hover { text-decoration: underline; }

  .btn-primary {
    font-size: 11px;
    background: var(--sf-blue);
    border: none;
    color: white;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-primary:hover { background: #0156a3; }

  /* ── Trend Chart ── */
  .chart-container {
    position: relative;
    height: 240px;
  }
  .chart-footer {
    font-size: 11px;
    color: var(--sf-muted);
    border-top: 1px solid var(--sf-border);
    padding-top: 10px;
    margin-top: 8px;
  }

  /* ── Partner Rollup ── */
  .partner-item { margin-bottom: 10px; }
  .partner-item:last-child { margin-bottom: 0; }
  .partner-header {
    display: flex; justify-content: space-between;
    font-size: 12px; margin-bottom: 3px;
  }
  .partner-name { font-weight: 600; color: var(--sf-navy); }
  .partner-name-sub { font-weight: 400; color: var(--sf-muted); }
  .partner-rate { font-weight: 700; }
  .partner-bar-track {
    position: relative;
    height: 8px;
    background: #ececec;
    border-radius: 4px;
    overflow: hidden;
  }
  .partner-bar-fill { height: 100%; }
  .partner-bar-target {
    position: absolute; left: 50%; top: -2px; bottom: -2px;
    width: 2px; background: var(--sf-navy);
  }
  .partner-gmv {
    font-size: 10px; color: var(--sf-muted); margin-top: 2px;
  }
  .trend-arrow { font-size: 11px; font-weight: 700; margin-left: 4px; }
  .trend-arrow.up   { color: var(--sf-red); }
  .trend-arrow.down { color: var(--sf-green); }
  .trend-arrow.flat { color: var(--sf-light); }

  /* ── Insights Panel ── */
  .insights { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 900px) { .insights { grid-template-columns: 1fr; } }
  .insight {
    padding: 14px;
    border-radius: 6px;
    border-left: 4px solid;
  }
  .insight-title {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  .insight-text { font-size: 13px; line-height: 1.45; color: var(--sf-text); }
  .insight.green  { background: rgba(46, 132, 74, 0.05);  border-left-color: var(--sf-green); }
  .insight.green .insight-title { color: var(--sf-green); }
  .insight.yellow { background: rgba(254, 147, 57, 0.05); border-left-color: var(--sf-orange); }
  .insight.yellow .insight-title { color: var(--sf-orange); }
  .insight.red    { background: rgba(186, 5, 23, 0.05);   border-left-color: var(--sf-red); }
  .insight.red    .insight-title { color: var(--sf-red); }

  /* ── Two-column rows ── */
  .row-2 {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) { .row-2 { grid-template-columns: 1fr; } }

  .row-2-even {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) { .row-2-even { grid-template-columns: 1fr; } }

  .row-14 {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) { .row-14 { grid-template-columns: 1fr; } }

  /* ── AM Detail Header ── */
  .am-detail-header {
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid var(--sf-border);
  }
  .am-detail-info { flex: 1; }
  .am-detail-name-row {
    display: flex; align-items: center; gap: 10px;
  }
  .am-detail-name {
    font-size: 22px; font-weight: 700; color: var(--sf-navy);
  }
  .am-detail-title {
    font-size: 13px; color: var(--sf-muted); margin-top: 2px;
  }
  .am-score-block { text-align: right; }
  .am-score-label {
    font-size: 11px; color: var(--sf-muted);
    text-transform: uppercase; letter-spacing: 0.4px; font-weight: 700;
  }
  .am-score-value {
    font-size: 44px; font-weight: 700; line-height: 1;
  }
  .am-score-breakdown { font-size: 11px; color: var(--sf-muted); }

  .am-detail-stats {
    padding: 14px 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    background: #fafaf9;
  }
  @media (max-width: 700px) { .am-detail-stats { grid-template-columns: repeat(2, 1fr); } }
  .header-stat-label {
    font-size: 10px; font-weight: 700; color: var(--sf-muted);
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .header-stat-value {
    font-size: 20px; font-weight: 700; color: var(--sf-navy); margin-top: 2px;
  }
  .header-stat-sub {
    font-size: 11px; color: var(--sf-muted); margin-top: 2px;
  }

  /* ── KPI Scorecard Grid ── */
  .kpi-scorecard {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (max-width: 900px) { .kpi-scorecard { grid-template-columns: repeat(2, 1fr); } }
  .kpi-scorecard-item {
    padding: 12px;
    border: 1px solid var(--sf-border);
    border-left: 4px solid var(--sf-green);
    border-radius: 4px;
    background: white;
  }
  .kpi-scorecard-item.green  { border-left-color: var(--sf-green); }
  .kpi-scorecard-item.yellow { border-left-color: var(--sf-orange); }
  .kpi-scorecard-item.red    { border-left-color: var(--sf-red); background: rgba(255, 221, 225, 0.25); }
  .kpi-scorecard-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .kpi-scorecard-label {
    font-size: 11px; font-weight: 700;
    color: var(--sf-muted);
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .kpi-scorecard-body {
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .kpi-scorecard-value {
    font-size: 22px; font-weight: 700;
  }
  .kpi-scorecard-value.green  { color: var(--sf-green); }
  .kpi-scorecard-value.yellow { color: var(--sf-orange); }
  .kpi-scorecard-value.red    { color: var(--sf-red); }
  .kpi-scorecard-target {
    font-size: 10px; color: var(--sf-muted);
  }

  /* ── Tier tile ── */
  .tier-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .tier-tile {
    text-align: center;
    padding: 12px;
    border: 1px solid var(--sf-border);
    border-radius: 4px;
    border-top: 3px solid;
  }
  .tier-tile-count { font-size: 28px; font-weight: 700; }
  .tier-tile-label { font-size: 12px; font-weight: 600; color: var(--sf-navy); }
  .tier-tile-sub   { font-size: 10px; color: var(--sf-muted); }
  .tier-tile-pct   { font-size: 10px; color: var(--sf-muted); margin-top: 4px; }

  .tier-tile.he { border-top-color: var(--sf-green); }
  .tier-tile.he .tier-tile-count { color: var(--sf-green); }
  .tier-tile.me { border-top-color: var(--sf-teal); }
  .tier-tile.me .tier-tile-count { color: var(--sf-teal); }
  .tier-tile.le { border-top-color: var(--sf-orange); }
  .tier-tile.le .tier-tile-count { color: var(--sf-orange); }
  .tier-tile.d  { border-top-color: var(--sf-red); }
  .tier-tile.d  .tier-tile-count { color: var(--sf-red); }

  .capture-note {
    margin-top: 16px;
    padding: 12px;
    background: var(--sf-gray);
    border-radius: 4px;
    font-size: 12px;
    color: var(--sf-muted);
    line-height: 1.5;
  }
  .capture-note strong { color: var(--sf-navy); }

  /* ── Partner table ── */
  .partner-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .partner-table th {
    padding: 8px;
    text-align: center;
    font-size: 10px; font-weight: 700; color: var(--sf-muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--sf-border);
  }
  .partner-table th.left { text-align: left; }
  .partner-table td {
    padding: 6px 8px;
    text-align: center;
    border-bottom: 1px solid var(--sf-border);
  }
  .partner-table td.left { text-align: left; }
  .partner-table .dormant-count {
    font-weight: 700;
  }
  .partner-table .dormant-count.red   { color: var(--sf-red); }
  .partner-table .dormant-count.green { color: var(--sf-green); }

  /* ── Action Queue ── */
  .queue-empty {
    padding: 20px;
    text-align: center;
    color: var(--sf-green);
    font-weight: 600;
  }
  .queue-item {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 4px;
    border-left: 3px solid;
    margin-bottom: 6px;
  }
  .queue-item:last-child { margin-bottom: 0; }
  .queue-item.orange { background: var(--sf-orange-bg); border-left-color: var(--sf-orange); }
  .queue-item.red    { background: rgba(255, 221, 225, 0.5); border-left-color: var(--sf-red); }
  .queue-item-info { flex: 1; }
  .queue-item-name { font-size: 12px; font-weight: 600; color: var(--sf-navy); }
  .queue-item-sub  { font-size: 11px; color: var(--sf-muted); }
  .queue-item-days { font-size: 11px; font-weight: 700; margin-right: 10px; }
  .queue-item-days.orange { color: var(--sf-orange); }
  .queue-item-days.red    { color: var(--sf-red); }

  /* ── Coaching Note ── */
  .coaching-note {
    padding: 14px;
    border-radius: 6px;
    border-left: 4px solid;
    font-size: 13px;
    color: var(--sf-text);
    line-height: 1.55;
  }
  .coaching-note.green  { background: rgba(205, 239, 196, 0.4); border-left-color: var(--sf-green); }
  .coaching-note.yellow { background: rgba(255, 243, 224, 0.6); border-left-color: var(--sf-orange); }
  .coaching-note.red    { background: rgba(255, 221, 225, 0.4); border-left-color: var(--sf-red); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 16px 0 24px;
    font-size: 11px;
    color: var(--sf-light);
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--sf-muted);
  }
  .legend span { display: inline-flex; align-items: center; }
</style>
</head>
<body>

<!-- Top nav -->
<div class="topnav">
  <div class="topnav-logo">
    <div class="topnav-logo-icon">☁</div>
    <div class="topnav-title">DigniFi · Sales <span>/</span> AM Performance</div>
  </div>
  <div class="topnav-spacer"></div>
  <div class="topnav-identity">
    <label>Viewing as:</label>
    <select id="identity-select">
      <option value="exec">👔 Executive (Full Access)</option>
      <optgroup label="Individual AM View">
        <option value="jerome">Jerome Carthen — AM Team Lead</option>
        <option value="megan">Megan Buell — Account Manager</option>
        <option value="kelsey">Kelsey Rookard — Account Manager</option>
        <option value="roman">Roman Mitchell — Account Manager</option>
        <option value="carlos">Carlos Miller — Account Manager</option>
      </optgroup>
    </select>
  </div>
</div>

<!-- Page header -->
<div class="pageheader">
  <div>
    <div class="breadcrumb" id="breadcrumb">Account Management</div>
    <div class="pageheader-title" id="pageheader-title">AM Performance Dashboard</div>
    <div class="pageheader-sub" id="pageheader-sub">Executive rollup · Full access to all AMs and merchants · Period: Feb 1 – Feb 28, 2026</div>
  </div>
  <button class="btn-back" id="btn-back" style="display:none;" onclick="goExec()">← Back to Team Rollup</button>
</div>

<!-- Main content target -->
<div class="main" id="main"></div>

<div class="footer">
  DigniFi · AM Performance Dashboard · Salesforce Lightning · Data refreshed daily at 6:00 AM CT
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════════

function statusOf(val, t) {
  if (t.inverse) {
    if (val <= t.green) return "green";
    if (val <= t.yellow) return "yellow";
    return "red";
  }
  if (val >= t.green) return "green";
  if (val >= t.yellow) return "yellow";
  return "red";
}
function statusLabel(s) {
  return s === "green" ? "On Track" : s === "yellow" ? "Watch" : "At Risk";
}

function scoreAM(am) {
  const kpiMap = {
    touchCoverage: THRESHOLDS.touchCoverage,
    dormancy: THRESHOLDS.dormancy,
    captureRate: THRESHOLDS.captureRate,
    gmvAtRisk: THRESHOLDS.gmvAtRisk,
    gmvGrowth: THRESHOLDS.gmvGrowth,
    neverActive60: THRESHOLDS.neverActive60,
    crmLogging: THRESHOLDS.crmLogging,
    daysToTraining: THRESHOLDS.daysToTraining,
    retraining: THRESHOLDS.retraining,
    cadenceComp: THRESHOLDS.cadenceComp
  };
  let g = 0, y = 0, r = 0;
  Object.keys(kpiMap).forEach(k => {
    const s = statusOf(am[k], kpiMap[k]);
    if (s === "green") g++;
    else if (s === "yellow") y++;
    else r++;
  });
  const score = Math.round(((g + y * 0.5) / 10) * 100);
  const status = r >= 2 ? "red" : y >= 3 ? "yellow" : g >= 7 ? "green" : "yellow";
  return { score, status, g, y, r };
}

const fmt$ = (n) =>
  n >= 1000000 ? "$" + (n/1000000).toFixed(2) + "M"
  : n >= 1000 ? "$" + (n/1000).toFixed(1) + "K"
  : "$" + n.toLocaleString();
const fmt$full = (n) => "$" + n.toLocaleString();

// Escape HTML
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

let state = {
  identity: "exec",   // who is "logged in"
  view: "exec",       // "exec" | "am-<id>"
  drilledFromExec: false
};

function switchIdentity(id) {
  state.identity = id;
  if (id === "exec") state.view = "exec";
  else state.view = "am-" + id;
  state.drilledFromExec = false;
  render();
}

function goAM(amId, fromExec) {
  state.view = "am-" + amId;
  state.drilledFromExec = fromExec || false;
  render();
}

function goExec() {
  state.view = "exec";
  state.drilledFromExec = false;
  render();
}

function colorFor(status) {
  return status === "green" ? "var(--sf-green)"
       : status === "yellow" ? "var(--sf-orange)"
       : "var(--sf-red)";
}

function avatarHtml(initials, status, size) {
  const statusSize = size * 0.32;
  return `
    <div class="avatar" style="width:${size}px; height:${size}px; font-size:${size * 0.38}px;">
      ${initials}
      ${status ? `<div class="avatar-status ${status}" style="width:${statusSize}px; height:${statusSize}px;"></div>` : ""}
    </div>
  `;
}

function tierBarHtml(he, me, le, d) {
  const total = he + me + le + d;
  const seg = (count, cls) => {
    if (count === 0) return "";
    const pct = (count / total) * 100;
    return `<div class="tierbar-seg ${cls}" style="width: ${pct}%;">${pct >= 8 ? count : ""}</div>`;
  };
  return `
    <div class="tierbar">
      ${seg(he, "he")}${seg(me, "me")}${seg(le, "le")}${seg(d, "d")}
    </div>
  `;
}

function renderPartnerItem(p) {
  const s = p.dormRate < 20 ? "green" : p.dormRate < 35 ? "yellow" : "red";
  const fillPct = Math.min(100, (p.dormRate / 40) * 100);
  return `
    <div class="partner-item">
      <div class="partner-header">
        <span class="partner-name">${esc(p.name)} <span class="partner-name-sub">· ${p.stores} stores</span></span>
        <span class="partner-rate" style="color: ${colorFor(s)};">
          ${p.dormRate}% <span class="trend-arrow ${p.trend}">${p.trend === 'up' ? '▲' : p.trend === 'down' ? '▼' : '—'}</span>
        </span>
      </div>
      <div class="partner-bar-track">
        <div class="partner-bar-fill" style="width: ${fillPct}%; background: ${colorFor(s)};"></div>
        <div class="partner-bar-target" title="20% target"></div>
      </div>
      <div class="partner-gmv">${fmt$(p.gmv)} GMV MTD</div>
    </div>
  `;
}

  merchants.forEach(m => {
    if (!partnerCounts[m.partner]) partnerCounts[m.partner] = { gmv: 0, stores: 0, dormant: 0 };
    partnerCounts[m.partner].gmv += m.gmv;
    partnerCounts[m.partner].stores++;
    if (m.tier === "D") partnerCounts[m.partner].dormant++;
  });

  return `
    <!-- AM header card -->
    <div class="card">
      <div class="am-detail-header">
        ${avatarHtml(am.initials, score.status, 64)}
        <div class="am-detail-info">
          <div class="am-detail-name-row">
            <div class="am-detail-name">${esc(am.name)}</div>
            <span class="pill ${score.status}"><span class="dot small ${score.status}"></span>${statusLabel(score.status)}</span>
          </div>
          <div class="am-detail-title">
            ${esc(am.title)} · ${am.accounts} dealer accounts${am.id !== "jerome" ? " · Reporting to Jerome Carthen (AM Team Lead)" : ""}
          </div>
        </div>
        <div class="am-score-block">
          <div class="am-score-label">Performance Score</div>
          <div class="am-score-value" style="color: ${colorFor(score.status)};">${score.score}</div>
          <div class="am-score-breakdown">
            <span style="color: var(--sf-green);">${score.g} Green</span> ·
            <span style="color: var(--sf-orange);">${score.y} Yellow</span> ·
            <span style="color: var(--sf-red);">${score.r} Red</span>
          </div>
        </div>
      </div>
      <div class="am-detail-stats">
        <div>
          <div class="header-stat-label">GMV · MTD</div>
          <div class="header-stat-value">${fmt$full(am.gmvMTD)}</div>
          <div class="header-stat-sub" style="color: ${am.gmvGrowth >= 0 ? 'var(--sf-green)' : 'var(--sf-red)'};">
            ${am.gmvGrowth >= 0 ? '▲' : '▼'} ${Math.abs(am.gmvGrowth)}% MoM
          </div>
        </div>
        <div>
          <div class="header-stat-label">Highly Engaged</div>
          <div class="header-stat-value">${am.tierHE} / ${am.accounts}</div>
          <div class="header-stat-sub">${Math.round(am.tierHE / am.accounts * 100)}% of book</div>
        </div>
        <div>
          <div class="header-stat-label">Dormant ($0)</div>
          <div class="header-stat-value">${am.tierD}</div>
          <div class="header-stat-sub" style="color: ${colorFor(statusOf(am.dormancy, THRESHOLDS.dormancy))};">
            ${am.dormancy}% dormancy rate
          </div>
        </div>
        <div>
          <div class="header-stat-label">GMV at Risk</div>
          <div class="header-stat-value">${fmt$full(am.gmvAtRisk)}</div>
          <div class="header-stat-sub" style="color: var(--sf-red);">Opportunity to recover</div>
        </div>
      </div>
    </div>

    <!-- 11-KPI Scorecard -->
    <div class="card">
      <div class="card-title">
        <div class="card-title-text">KPI Scorecard · AM Playbook Thresholds</div>
      </div>
      <div class="card-body">
        <div class="kpi-scorecard">
          ${kpis.map(k => `
            <div class="kpi-scorecard-item ${k.status}">
              <div class="kpi-scorecard-head">
                <div class="kpi-scorecard-label">${k.label}</div>
                <span class="dot ${k.status}"></span>
              </div>
              <div class="kpi-scorecard-body">
                <div class="kpi-scorecard-value ${k.status}">${k.value}</div>
                <div class="kpi-scorecard-target">Target: ${k.target}</div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>

    <!-- Portfolio composition + partner distribution -->
    <div class="row-14">
      <div class="card">
        <div class="card-title">
          <div class="card-title-text">Portfolio Composition by Engagement Tier</div>
        </div>
        <div class="card-body">
          <div style="margin-bottom: 16px;">
            ${tierBarHtml(am.tierHE, am.tierME, am.tierLE, am.tierD)}
          </div>
          <div class="tier-grid">
            ${tierTile("Highly Engaged", am.tierHE, "$10K+ / mo", "he", am.accounts)}
            ${tierTile("Mid Engaged",    am.tierME, "$2.5K–$10K", "me", am.accounts)}
            ${tierTile("Low Engaged",    am.tierLE, "&lt; $2.5K",  "le", am.accounts)}
            ${tierTile("Dormant",        am.tierD,  "$0",          "d",  am.accounts)}
          </div>
          <div class="capture-note">
            <strong>GMV Capture Model:</strong>
            Max potential = (book × $10K floor) = <strong>${fmt$(am.accounts * 10000)}/mo</strong>.
            Current capture at ${am.captureRate}% implies
            <strong>${fmt$(Math.round(am.accounts * 10000 * (1 - am.captureRate/100)))}</strong>
            in recoverable upside.
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <div class="card-title-text">Partner Distribution</div>
        </div>
        <div class="card-body">
          <table class="partner-table">
            <thead>
              <tr>
                <th class="left">Partner</th>
                <th>Stores</th>
                <th>GMV</th>
                <th>Dormant</th>
              </tr>
            </thead>
            <tbody>
              ${Object.keys(partnerCounts).map(name => {
                const p = partnerCounts[name];
                return `
                  <tr>
                    <td class="left" style="font-weight: 600;">${esc(name)}</td>
                    <td>${p.stores}</td>
                    <td>${fmt$(p.gmv)}</td>
                    <td class="dormant-count ${p.dormant > 0 ? 'red' : 'green'}">${p.dormant}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Action queues -->
    <div class="row-2-even">
      <div class="card">
        <div class="card-title">
          <div class="card-title-text">Untouched Accounts (${untouched.length})</div>
          <div class="card-title-action" style="color: var(--sf-red);">Priority outreach required</div>
        </div>
        <div class="card-body">
          ${untouched.length === 0
            ? `<div class="queue-empty">All accounts touched this month ✓</div>`
            : untouched.map(m => `
                <div class="queue-item ${m.lastTouch > 20 ? 'red' : 'orange'}">
                  <div class="queue-item-info">
                    <div class="queue-item-name">${esc(m.name)}</div>
                    <div class="queue-item-sub">${esc(m.partner)} · Tier ${m.tier} · ${m.gmv === 0 ? "Dormant" : fmt$(m.gmv)}</div>
                  </div>
                  <div class="queue-item-days ${m.lastTouch > 20 ? 'red' : 'orange'}">${m.lastTouch}d</div>
                  <button class="btn-primary">Log Touch</button>
                </div>
              `).join("")}
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <div class="card-title-text">Dormant Accounts ($0 GMV) (${dormant.length})</div>
          <div class="card-title-action" style="color: var(--sf-red);">14-day retraining trigger</div>
        </div>
        <div class="card-body">
          ${dormant.length === 0
            ? `<div class="queue-empty">No dormant accounts ✓</div>`
            : dormant.map(m => `
                <div class="queue-item red">
                  <div class="queue-item-info">
                    <div class="queue-item-name">${esc(m.name)}</div>
                    <div class="queue-item-sub">${esc(m.partner)} · GMV at Risk: <strong style="color: var(--sf-red);">$10K/mo</strong></div>
                  </div>
                  <button class="btn-primary">Schedule Retraining</button>
                </div>
              `).join("")}
        </div>
      </div>
    </div>

    <!-- Coaching note (exec only) -->
    ${isExec ? `
      <div class="card">
        <div class="card-title">
          <div class="card-title-text">Manager Coaching Note · Exec Only</div>
        </div>
        <div class="card-body">
          <div class="coaching-note ${score.status}">
            ${coachingNote(am, score)}
          </div>
        </div>
      </div>
    ` : ""}
  `;
}

function tierTile(label, count, sub, cls, total) {
  const pct = Math.round((count / total) * 100);
  return `
    <div class="tier-tile ${cls}">
      <div class="tier-tile-count">${count}</div>
      <div class="tier-tile-label">${label}</div>
      <div class="tier-tile-sub">${sub}</div>
      <div class="tier-tile-pct">${pct}% of book</div>
    </div>
  `;
}

function coachingNote(am, score) {
  const first = am.name.split(" ")[0];
  if (score.status === "green") {
    return `${first} is performing above target on ${score.g} of 10 KPIs. Recommendation: amplify their cadence as the team standard. Consider assigning 2-3 new Xtime merchants from Roman or Carlos's book to test scale capacity.`;
  }
  if (score.status === "yellow") {
    const weak = [];
    if (am.dormancy > 20) weak.push("dormancy");
    if (am.captureRate < 60) weak.push("capture rate");
    if (am.retraining > 14) weak.push("retraining SLA");
    return `${first} is mixed — ${score.g} green, ${score.y} yellow, ${score.r} red. Weakest areas: ${weak.join(", ")}. Recommendation: 30-day focus plan on untouched accounts + retraining backlog. Revisit in weekly 1:1.`;
  }
  return `${first} is red on ${score.r} KPIs with $${(am.gmvAtRisk/1000).toFixed(0)}K GMV at risk. Recommendation: formal PIP, reassignment of ${am.tierD} dormant stores to a top-performing AM, and a cadence audit this week. Escalate to VP if no green-zone KPI recovery within 30 days.`;
}

// ═══════════════════════════════════════════════════════════════════════
// CHART (recreated on each exec render)
// ═══════════════════════════════════════════════════════════════════════
let trendChart = null;
function renderTrendChart() {
  const canvas = document.getElementById("trend-chart");
  if (!canvas) return;
  if (trendChart) { trendChart.destroy(); trendChart = null; }
  const ctx = canvas.getContext("2d");
  trendChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: TREND.map(t => t.month),
      datasets: [
        {
          label: "GMV ($K)",
          data: TREND.map(t => t.gmv),
          borderColor: "#0176d3",
          backgroundColor: "rgba(1,118,211,0.08)",
          borderWidth: 3,
          yAxisID: "y",
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 6
        },
        {
          label: "Dormancy %",
          data: TREND.map(t => t.dormancy),
          borderColor: "#ba0517",
          backgroundColor: "rgba(186,5,23,0.04)",
          borderWidth: 2,
          borderDash: [5, 5],
          yAxisID: "y1",
          tension: 0.3,
          pointRadius: 3,
          pointHoverRadius: 5
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { position: "top", labels: { font: { size: 11 } } },
        tooltip: { backgroundColor: "#032d60", titleFont: { size: 12 }, bodyFont: { size: 12 } }
      },
      scales: {
        x: { grid: { color: "#ececec" }, ticks: { color: "#3e3e3c", font: { size: 11 } } },
        y: {
          type: "linear", position: "left",
          grid: { color: "#ececec" },
          ticks: { color: "#0176d3", font: { size: 11 } },
          title: { display: true, text: "GMV ($K)", color: "#0176d3", font: { size: 11 } }
        },
        y1: {
          type: "linear", position: "right",
          grid: { drawOnChartArea: false },
          ticks: { color: "#ba0517", font: { size: 11 } },
          title: { display: true, text: "Dormancy %", color: "#ba0517", font: { size: 11 } }
        }
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════
function render() {
  const isExec = state.identity === "exec";
  const currentAM = state.view.startsWith("am-") ? state.view.slice(3) : null;

  // Update breadcrumb + title
  const breadcrumb = document.getElementById("breadcrumb");
  const title = document.getElementById("pageheader-title");
  const sub = document.getElementById("pageheader-sub");
  const btnBack = document.getElementById("btn-back");

  if (currentAM) {
    const am = AMs.find(a => a.id === currentAM);
    breadcrumb.innerHTML = isExec
      ? `<span class="crumb-link" onclick="goExec()">Account Management</span> <span class="sep">/</span> ${esc(am.name)}`
      : `Account Management <span class="sep">/</span> ${esc(am.name)}`;
    title.textContent = am.name + " · Performance";
  } else {
    breadcrumb.innerHTML = "Account Management";
    title.textContent = "AM Performance Dashboard";
  }

  sub.innerHTML = (isExec
    ? "Executive rollup · Full access to all AMs and merchants"
    : `Account Manager view · ${esc(AMs.find(a => a.id === state.identity).name)}'s book only`
  ) + " · Period: Feb 1 – Feb 28, 2026";

  btnBack.style.display = (isExec && currentAM && state.drilledFromExec) ? "inline-block" : "none";

  // Sync identity select
  document.getElementById("identity-select").value = state.identity;

  // Render main body
  const main = document.getElementById("main");
  if (state.view === "exec" && isExec) {
    main.innerHTML = renderExec();
    // Render chart after DOM is updated
    setTimeout(renderTrendChart, 0);
  } else {
    main.innerHTML = renderAM(currentAM || state.identity, isExec);
  }

  // Scroll to top on view change
  window.scrollTo(0, 0);
}

// Identity selector
document.getElementById("identity-select").addEventListener("change", (e) => {
  switchIdentity(e.target.value);
});

// Initial render
render();
</script>

</body>
</html>
